server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes[0]:
            id: users-status-check
            uri: lb://demo-resource-server
            predicates[0]: Path=/users/status/check
            predicates[1]: Method=GET
            filters[0]: RemoveRequestHeader=Cookie

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8010/eureka # to register eureka





